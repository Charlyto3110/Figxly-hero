<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Figxly — Hero</title>
    <meta name="description" content="Figxly: El talento que necesitas, a tu servicio con un clic." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "Segoe UI", "Roboto", "Arial", "sans-serif"] },
            boxShadow: {
              soft: "0 20px 60px rgba(15, 23, 42, 0.10)",
              pill: "0 10px 30px rgba(15, 23, 42, 0.12)",
              float: "0 25px 80px rgba(15, 23, 42, 0.18)",
              card: "0 10px 35px rgba(15, 23, 42, 0.10)",
            },
            colors: {
              ink: "#0F172A",
              slateInk: "#1F2A44",
              uiBlue: "#0B2B5C",
              uiBlue2: "#0F2A55",
              haze: "#EAF2FF",
              haze2: "#DDEBFF",
              coral: "#E5535C",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body class="min-h-screen bg-white font-sans text-ink antialiased">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(1200px_600px_at_10%_90%,rgba(140,185,255,0.35),transparent_60%),radial-gradient(900px_500px_at_80%_25%,rgba(160,200,255,0.22),transparent_55%)]"></div>
      <div class="absolute -left-32 top-44 h-[520px] w-[520px] rounded-full bg-[#CFE3FF] opacity-40 blur-3xl"></div>
      <div class="absolute left-56 top-72 h-[520px] w-[520px] rounded-full bg-[#DCEEFF] opacity-35 blur-3xl"></div>
      <div class="absolute right-[-160px] top-28 h-[620px] w-[620px] rounded-full bg-[#CFE3FF] opacity-35 blur-3xl"></div>
      <div class="absolute left-0 top-[340px] h-[420px] w-[860px] rotate-[-8deg] rounded-[999px] bg-[#DDEBFF] opacity-25 blur-3xl"></div>
      <div class="absolute bottom-[-240px] left-1/2 h-[520px] w-[1200px] -translate-x-1/2 rounded-[999px] bg-[#DCEEFF] opacity-25 blur-3xl"></div>
    </div>

    <div class="mx-auto max-w-[1200px] px-6 pb-12 pt-4">
      <header class="sticky top-0 z-40 flex items-center justify-between py-6 backdrop-blur-sm">
        <a class="inline-flex items-center gap-3 select-none" href="#/" aria-label="Figxly">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="1500 1000 7000 6000" class="h-12.05 w-12.05 shrink-0 text-black" aria-hidden="true">
            <g transform="translate(0,10240) scale(1,-1)" fill="currentColor" stroke="none">
              <path d="M4978 8930 c-100 -18 -227 -71 -313 -130 -56 -39 -1078 -1064 -1121 -1125 -56 -79 -123 -228 -150 -333 -60 -235 -35 -503 65 -717 84 -179 88 -184 895 -993 419 -419 766 -762 772 -762 11 0 919 906 919 918 0 4 -96 101 -213 217 l-213 209 -244 -244 -245 -245 -235 235 -235 235 247 247 248 248 -195 196 c-107 108 -181 187 -165 176 34 -25 191 -177 820 -797 246 -242 452 -441 459 -443 6 -1 142 129 302 290 305 306 350 362 421 515 19 42 46 119 61 172 22 84 25 117 26 266 1 188 -14 274 -76 417 -72 171 -80 180 -623 727 -280 282 -539 536 -575 563 -74 57 -197 118 -285 143 -69 19 -276 28 -347 15z m207 -609 c27 -13 198 -177 526 -507 451 -454 488 -494 514 -554 22 -50 29 -84 33 -155 8 -157 -34 -259 -160 -391 l-82 -85 -428 428 c-373 373 -432 428 -458 428 -26 0 -85 -55 -461 -430 l-430 -430 -83 87 c-129 134 -174 244 -163 398 7 98 19 136 67 207 54 81 987 1010 1020 1016 48 8 65 6 105 -12z" />
            </g>
          </svg>
          <span class="text-[30px] -ml-2 font-semibold leading-none tracking-[-0.02em] text-slateInk">Figxly</span>
        </a>

        <nav class="hidden items-center gap-8 md:flex" aria-label="Principal">
          <a data-nav="/" href="#/" class="nav-link text-[15px] font-medium text-slateInk/80 hover:text-slateInk transition">Inicio</a>
          <a data-nav="/requests" href="#/requests" class="nav-link text-[15px] font-medium text-slateInk/80 hover:text-slateInk transition">Solicitudes</a>
          <a data-nav="/support" href="#/support" class="nav-link text-[15px] font-medium text-slateInk/80 hover:text-slateInk transition">Asistencia</a>
        </nav>



        <div id="auth-desktop" class="hidden items-center gap-3 md:flex"></div>
        <button id="btn-mobile-menu" type="button" aria-expanded="false" class="md:hidden inline-flex items-center justify-center rounded-full border border-slate-200/80 bg-white/70 px-4 py-2 text-[14px] font-medium text-slateInk/80">Menú</button>
      </header>

      <div id="mobile-menu" class="md:hidden hidden mt-2 rounded-2xl border border-slate-200/70 bg-white/85 p-3 shadow-card backdrop-blur">
        <a data-nav="/" href="#/" class="block rounded-xl px-3 py-2 text-[15px] font-medium text-slateInk/80">Inicio</a>
        <a data-nav="/requests" href="#/requests" class="block rounded-xl px-3 py-2 text-[15px] font-medium text-slateInk/80">Solicitudes</a>
        <a data-nav="/support" href="#/support" class="block rounded-xl px-3 py-2 text-[15px] font-medium text-slateInk/80">Asistencia</a>
        <div id="auth-mobile" class="mt-3 border-t border-slate-200/80 pt-3"></div>
      </div>

      <main id="app" class="mt-10"></main>
    </div>

    <div id="toast" class="pointer-events-none fixed bottom-6 left-1/2 z-50 hidden -translate-x-1/2 rounded-full bg-uiBlue px-5 py-3 text-[14px] font-semibold text-white">OK</div>
    <div id="modal-root"></div>

    <script src="./data/data.js" defer></script>
    <script src="./main.js" defer></script>
  </body>
</html>
